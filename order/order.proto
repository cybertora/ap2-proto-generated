syntax = "proto3";

package order;

// ВАЖНО: замените YOUR_GITHUB_USER на ваш реальный GitHub username
option go_package = "github.com/cybertora/ap2-proto-generated/order";

import "google/protobuf/timestamp.proto";

// OrderService — сервис стриминга обновлений заказов.
// Order Service выступает gRPC-сервером для стриминга.
service OrderService {
  // SubscribeToOrderUpdates — Server-side Streaming RPC.
  // Клиент подписывается на обновления статуса конкретного заказа.
  // Стрим отправляет обновления в реальном времени при изменении
  // статуса заказа в базе данных (PostgreSQL LISTEN/NOTIFY).
  rpc SubscribeToOrderUpdates(OrderRequest) returns (stream OrderStatusUpdate);
}

// OrderRequest — запрос на подписку к обновлениям заказа.
message OrderRequest {
  string order_id = 1;  // UUID заказа, за которым следим
}

// OrderStatusUpdate — сообщение с обновлением статуса заказа.
message OrderStatusUpdate {
  string                    order_id   = 1;  // UUID заказа
  string                    status     = 2;  // Новый статус: Pending, Paid, Failed, Cancelled
  google.protobuf.Timestamp updated_at = 3;  // Время изменения статуса
}
